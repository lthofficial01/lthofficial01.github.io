name: Build CV

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "resume-src/**"
      - ".github/workflows/build-cv.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build resume PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: resume-src
          latexmk_use_xelatex: true

      - name: Publish built PDF
        shell: bash
        run: |
          mkdir -p data
          cp resume-src/resume.pdf data/TaehanLee-CV.pdf

          if git diff --quiet -- data/TaehanLee-CV.pdf; then
            echo "CV PDF is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/TaehanLee-CV.pdf
          git commit -m "Build CV PDF from resume.tex"
          git push
